name: Daily AI News Bot

on:
  schedule:
    # 매일 아침 8시 15분(KST) = UTC 23:15
    - cron: '15 23 * * *'
    # 백업: 9시 15분(KST) = UTC 00:15 — 첫 번째 실행 실패 시 재시도
    - cron: '15 0 * * *'
  workflow_dispatch: # GitHub 웹사이트에서 수동으로 버튼을 눌러 실행할 수 있게 함

# 동시 실행 방지: 같은 그룹의 워크플로우가 이미 실행 중이면 대기하지 않고 취소
concurrency:
  group: ai-news-bot
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 최대 15분 — 무한 대기 방지

    permissions:
      contents: write # 봇이 새 글을 작성하고 푸시할 수 있는 권한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI News Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python auto_poster.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/*.md
          
          # 새로운 파일이 있을 때만 커밋
          git status --porcelain | grep . && git commit -m "🤖 AI: 오늘의 뉴스 포스팅 자동 업로드" && git push || echo "새로운 뉴스가 없어 커밋을 건너뜁니다."
